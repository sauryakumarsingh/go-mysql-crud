version: "3.9"

services:

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: go_crud_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productsdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/001_create_products.sql:/docker-entrypoint-initdb.d/init.sql

  # Go API
  api:
    build: .
    container_name: go_crud_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: productsdb

volumes:
  mysql_data:
